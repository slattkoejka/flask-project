<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='css/style.css') }}"/>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css"
          integrity="sha384-giJF6kkoqNQ00vy+HMDP7azOuL0xtbfIcaT9wjKHr8RbDVddVHyTfAAsrekwKmP1"
          crossorigin="anonymous">

    {% block head %}{% endblock %}

    <title>{{ title }}</title>
</head>
<body>
<div class="text-center">
    <nav class="navbar navbar-dark bg-dark">
        <div class="container d-flex justify-content-between align-items-center w-100">

            <div class="d-flex gap-4">
                <a class="nav-link text-white" href="/">Главная</a>
            </div>

            <div class="d-flex gap-4">
                <a class="nav-link text-white" href="/rates">Курс валют</a>
            </div>

            <div class="d-flex gap-4">
                <a class="nav-link text-white" href="/dashboard">Операции</a>
            </div>

            <div class="d-flex gap-4">
                {% if current_user.is_authenticated %}
                    <a class="nav-link text-white" href="/account">Мой аккаунт</a>
                    <img
                        src="{{ url_for('static',
                            filename='img/avatars/' + (current_user.avatar or 'add_avatar_default.png')) }}"
                        width="40"
                        height="40"
                        class="rounded-circle"
                        style="object-fit: cover;"
                    >
                {% else %}
                    <a class="nav-link text-white" href="/login">Войти</a>
                    <a class="nav-link text-white" href="/register">Регистрация</a>
                {% endif %}
            </div>


        </div>
    </nav>
<!--    <h4 class="mt-3">Финансовая грамотность - это важно!</h4>-->


</div>
<main role="main" class="container">
    {% block content %}{% endblock %}
</main>
</body>
</html>
